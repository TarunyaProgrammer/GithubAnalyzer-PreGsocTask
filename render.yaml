services:
  # NestJS Backend
  - type: web
    name: webiu-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: webiu-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: webiu-redis
          property: connectionString
      - key: PORT
        value: 3000
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false

  # Redis Instance
  - type: redis
    name: webiu-redis
    plan: free # Render Free tier Redis (shared)
    ipAllowList: [] # Only allow internal connections

databases:
  - name: webiu-db
    plan: free # Render Free tier Postgres
    databaseName: webiu
    user: webiu
